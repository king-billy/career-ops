<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Cover Letter — {{COMPANY}}</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    line-height: 1.65;
    color: #1a1a2e;
    background: #ffffff;
    padding: 0;
    margin: 0;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 0;
  }

  /* === HEADER (matches CV exactly) === */
  .header {
    margin-bottom: 28px;
  }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 8px;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: #555;
  }

  .contact-row a {
    color: #555;
    text-decoration: none;
  }

  .contact-row .separator {
    color: #ccc;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  /* === DATE (top-right) === */
  .date-block {
    text-align: right;
    font-size: 11px;
    color: #666;
    margin-bottom: 24px;
  }

  /* === RECIPIENT === */
  .recipient {
    font-size: 11.5px;
    color: #333;
    margin-bottom: 20px;
  }

  .recipient .company-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    color: hsl(270, 70%, 45%);
  }

  /* === SUBJECT LINE === */
  .subject {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: hsl(187, 74%, 32%);
    border-bottom: 1px solid #e5e5e5;
    padding-bottom: 4px;
    margin-bottom: 18px;
  }

  /* === GREETING === */
  .greeting {
    font-size: 11.5px;
    color: #222;
    margin-bottom: 14px;
  }

  /* === BODY PARAGRAPHS === */
  .body-text p {
    font-size: 11.5px;
    line-height: 1.65;
    color: #222;
    margin-bottom: 12px;
    text-align: left;
  }

  .body-text p:last-child {
    margin-bottom: 0;
  }

  /* === SIGNATURE === */
  .signature {
    margin-top: 22px;
    font-size: 11.5px;
    color: #222;
  }

  .signature-signoff {
    margin-bottom: 6px;
  }

  .signature-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: #1a1a2e;
  }

  .signature-portfolio {
    font-size: 10px;
    color: hsl(270, 70%, 45%);
    margin-top: 2px;
  }

  .signature-portfolio a {
    color: hsl(270, 70%, 45%);
    text-decoration: none;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .page {
      padding: 0;
    }
  }

  .avoid-break {
    break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER (same as CV) -->
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">|</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- DATE -->
  <div class="date-block">{{DATE}}</div>

  <!-- RECIPIENT -->
  <div class="recipient">
    {{RECIPIENT}}<br>
    <span class="company-name">{{COMPANY}}</span>
  </div>

  <!-- SUBJECT LINE -->
  <div class="subject">{{SUBJECT_LINE}}</div>

  <!-- GREETING -->
  <div class="greeting">{{GREETING}}</div>

  <!-- BODY -->
  <div class="body-text">
    <p>{{HOOK_PARAGRAPH}}</p>
    <p>{{ROLE_PARAGRAPH}}</p>
    <p>{{PROOF_PARAGRAPH}}</p>
    <p>{{CLOSE_PARAGRAPH}}</p>
  </div>

  <!-- SIGNATURE -->
  <div class="signature avoid-break">
    <div class="signature-signoff">{{SIGNOFF}}</div>
    <div class="signature-name">{{NAME}}</div>
    <div class="signature-portfolio">
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
    </div>
  </div>

</div>
</body>
</html>
